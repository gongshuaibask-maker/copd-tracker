<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>COPD 图标生成器</title>
<style>
  body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
  canvas { border: 2px solid #ccc; border-radius: 24px; margin: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .sizes { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 20px 0; }
  .size-card { background: #fff; border-radius: 12px; padding: 12px; width: 140px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .size-card canvas { border: none; box-shadow: none; margin: 0 auto; display: block; }
  .size-card p { margin: 6px 0 0; font-size: 12px; color: #666; }
  button { padding: 12px 32px; font-size: 16px; background: #2E7D32; color: #fff;
           border: none; border-radius: 8px; cursor: pointer; margin: 8px; }
  button:hover { background: #1B5E20; }
  h1 { color: #2E7D32; }
  .preview-row { display: flex; justify-content: center; gap: 40px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<h1>🫁 慢阻肺自我管理 — App 图标</h1>
<p>自动生成各尺寸图标，右键点击下方图标即可另存为 PNG</p>

<div class="preview-row">
  <div id="main-preview"></div>
  <div class="sizes" id="size-previews"></div>
</div>

<button onclick="downloadPNG(1024)">📥 下载 1024×1024 (App Store)</button>
<button onclick="downloadPNG(512)">📥 下载 512×512 (Google Play)</button>

<script>
const SVG_DATA = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#43A047"/>
    </linearGradient>
    <linearGradient id="lungGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E8F5E9"/>
    </linearGradient>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="224" ry="224" fill="url(#bg)"/>
  <g transform="translate(340,260)" opacity="0.95">
    <path d="M0,280 C0,280 -30,200 10,140 C30,110 50,80 70,40 C80,20 100,10 110,0 C120,10 140,20 150,40 C170,80 190,110 210,140 C250,200 220,280 220,280 C220,350 200,420 170,460 C150,485 130,500 110,500 C90,500 70,485 50,460 C20,420 0,350 0,280 Z" fill="url(#lungGrad)" stroke="#FFFFFF" stroke-width="6" stroke-opacity="0.3"/>
    <path d="M100,0 C100,-40 100,-80 100,-100 C100,-130 90,-150 80,-170" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9"/>
  </g>
  <g transform="translate(684,260) scale(-1,1)" opacity="0.95">
    <path d="M0,280 C0,280 -30,200 10,140 C30,110 50,80 70,40 C80,20 100,10 110,0 C120,10 140,20 150,40 C170,80 190,110 210,140 C250,200 220,280 220,280 C220,350 200,420 170,460 C150,485 130,500 110,500 C90,500 70,485 50,460 C20,420 0,350 0,280 Z" fill="url(#lungGrad)" stroke="#FFFFFF" stroke-width="6" stroke-opacity="0.3"/>
    <path d="M100,0 C100,-40 100,-80 100,-100 C100,-130 90,-150 80,-170" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9"/>
  </g>
  <path d="M502,140 C502,120 502,100 502,80 C502,60 512,50 522,45 C535,38 520,25 510,18" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-opacity="0.9"/>
  <g transform="translate(420,600)" opacity="0.6">
    <path d="M0,30 L20,30 L35,30 L40,5 L45,55 L50,30 L65,30 L80,30 L85,15 L90,45 L95,30 L110,30 L130,30" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(750,660)">
    <rect x="-16" y="-6" width="32" height="12" rx="3" fill="#FFFFFF" opacity="0.5"/>
    <rect x="-6" y="-16" width="12" height="32" rx="3" fill="#FFFFFF" opacity="0.5"/>
  </g>
</svg>`;

function renderSVG(size) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    const img = new Image();
    const blob = new Blob([SVG_DATA], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      // Draw rounded rect clip
      ctx.beginPath();
      const r = size * 0.21875;
      ctx.moveTo(size * 0.0625 + r, size * 0.0625);
      ctx.lineTo(size * 0.9375 - r, size * 0.0625);
      ctx.arcTo(size * 0.9375, size * 0.0625, size * 0.9375, size * 0.0625 + r, r);
      ctx.lineTo(size * 0.9375, size * 0.9375 - r);
      ctx.arcTo(size * 0.9375, size * 0.9375, size * 0.9375 - r, size * 0.9375, r);
      ctx.lineTo(size * 0.0625 + r, size * 0.9375);
      ctx.arcTo(size * 0.0625, size * 0.9375, size * 0.0625, size * 0.9375 - r, r);
      ctx.lineTo(size * 0.0625, size * 0.0625 + r);
      ctx.arcTo(size * 0.0625, size * 0.0625, size * 0.0625 + r, size * 0.0625, r);
      ctx.clip();
      ctx.drawImage(img, 0, 0, size, size);
      URL.revokeObjectURL(url);
      resolve(canvas);
    };
    img.src = url;
  });
}

function downloadPNG(size) {
  renderSVG(size).then(canvas => {
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `icon-${size}x${size}.png`;
      a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  });
}

(async function init() {
  // Main preview
  const mainCanvas = await renderSVG(512);
  mainCanvas.style.width = '280px';
  mainCanvas.style.height = '280px';
  document.getElementById('main-preview').appendChild(mainCanvas);

  // Size previews
  const sizes = [48, 96, 180, 512, 1024];
  const container = document.getElementById('size-previews');
  for (const s of sizes) {
    const c = await renderSVG(s);
    const card = document.createElement('div');
    card.className = 'size-card';
    c.style.width = '64px';
    c.style.height = '64px';
    card.appendChild(c);
    const p = document.createElement('p');
    p.textContent = s + '×' + s;
    card.appendChild(p);
    container.appendChild(card);
  }
})();
</script>
</body>
</html>
